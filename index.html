<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Хорор: Повне Виживання в Квартирах</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0d0d13;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            width: 850px;
            background: #14141f;
            border: 3px solid #3a0007;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.4rem; color: #ff3333; text-shadow: 0 0 5px rgba(255,0,0,0.5); }

        .status-container {
            display: flex;
            gap: 20px;
            width: 100%;
            margin-bottom: 15px;
        }

        .status-box { flex: 1; background: #1a1a26; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .bar-bg { width: 100%; background: #222; height: 12px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #fear-fill { background: #ff0055; width: 0%; }
        #battery-fill { background: #00ff66; width: 100%; }

        #apartment-map {
            display: grid;
            gap: 15px;
            margin-bottom: 15px;
        }

        .grid-apt1 { grid-template-columns: 1fr 1fr; }
        .grid-apt-default { grid-template-columns: 1fr 1fr 1fr; }

        .room {
            background: #1e1e2f;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            padding: 15px;
            text-align: center;
            min-height: 100px;
        }

        .room:hover { border-color: #ff3333; background: #25253a; }
        .room.active-room { border-color: #ffaa00; box-shadow: 0 0 15px rgba(255,170,0,0.3); background: #2a2a40; }
        .room-title { font-size: 1rem; font-weight: bold; margin-bottom: 5px; color: #aaa; }
        .room.active-room .room-title { color: #ffaa00; }

        #front-door {
            background: #2a1a1a;
            border: 2px dashed #ff3333;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        #front-door:hover { background: #3d2222; }

        .door-apt1 { grid-column: span 2; }
        .door-apt-default { grid-column: span 3; }

        #interaction-panel {
            background: #1a1a26;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #task-info-topright {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.85rem;
            color: #ffaa00;
            font-weight: bold;
            border: 1px solid #333;
            padding: 4px 10px;
            border-radius: 4px;
            background: #111;
        }

        #task-text { font-size: 1.15rem; color: #ffcc00; font-weight: bold; margin-bottom: 20px; line-height: 1.5; min-height: 60px; width: 90%; text-align: center; }
        
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            background: #8b0000;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:hover { background: #b30000; transform: translateY(-2px); }
        .action-btn:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

        .skip-btn {
            background: #2b2b36;
            color: #bbb;
            border: 1px solid #555;
        }
        .skip-btn:hover { background: #3d3d4f; color: #fff; }
        .skip-btn:disabled { background: #222; color: #555; cursor: not-allowed; transform: none; }

        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        #screamer-screen { background: #000; }
        #screamer-monster { font-size: 15rem; animation: shake 0.05s infinite; color: red; text-shadow: 0 0 40px red; margin: 0; }
        
        .ending-title { font-size: 3rem; font-weight: bold; margin-bottom: 15px; }
        .ending-desc { font-size: 1.3rem; max-width: 600px; color: #ccc; margin-bottom: 30px; line-height: 1.6; }

        @keyframes shake {
            0% { transform: translate(3px, 5px) rotate(0deg); }
            50% { transform: translate(-5px, -3px) rotate(-1deg); }
            100% { transform: translate(2px, -4px) rotate(1deg); }
        }

        .restart-btn {
            background: #222; color: #fff; border: 2px solid #ff3333;
            padding: 12px 25px; font-size: 1.1rem; cursor: pointer; font-family: inherit;
            margin-top: 10px;
        }
        .restart-btn:hover { background: #ff3333; color: #000; font-weight: bold; }

        #setup-screen {
            display: flex;
            background: #0a0a0f;
        }
        .setup-container {
            display: flex;
            flex-direction: column;
            max-width: 450px;
            width: 100%;
            justify-content: center;
            background: #11111a;
            border: 2px solid #222;
            padding: 25px;
            border-radius: 8px;
            gap: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        .setup-container h3 { margin: 0 0 10px 0; color: #ffaa00; text-align: center; font-size: 1.3rem; letter-spacing: 1px; }
        
        .select-btn {
            background: #1a1a26; 
            color: #fff; 
            border: 2px solid #444;
            padding: 14px; 
            font-size: 1rem; 
            cursor: pointer; 
            font-family: inherit;
            border-radius: 6px; 
            font-weight: bold; 
            transition: all 0.2s;
            text-align: center;
        }
        .select-btn:hover, .select-btn.active { border-color: #ff3333; color: #ff3333; box-shadow: 0 0 10px rgba(255,51,51,0.2); }
        .select-btn.active { background: #2a1518; border-color: #ff3333; }
        
        .nav-menu-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            width: 100%;
        }
        .nav-menu-btn {
            flex: 1;
            padding: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .next-btn { background: #8b0000; color: #fff; border: 2px solid #ff3333; }
        .next-btn:hover { background: #ff3333; color: #000; }
        .back-btn { background: #222; color: #aaa; border: 1px solid #555; }
        .back-btn:hover { background: #333; color: #fff; }

        .lang-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10005; 
        }
        .lang-btn {
            background: #111;
            color: #666;
            border: 1px solid #333;
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .lang-btn:hover { border-color: #ff3333; color: #fff; }
        .lang-btn.active { background: #8b0000; color: #fff; border-color: #ff3333; box-shadow: 0 0 8px rgba(255,0,0,0.4); }
    </style>
</head>

        <button class="lang-btn active" id="lang-btn-uk" onclick="changeLanguage('uk')">UA</button>

        <button class="lang-btn" id="lang-btn-ru" onclick="changeLanguage('ru')">RU</button>
    </div>

            <button class="select-btn" id="apt-btn-2" onclick="selectApartment(2)">КВАРТИРА №2</button>
            <button class="select-btn" id="apt-btn-3" onclick="selectApartment(3)">КВАРТИРА №3</button>
            
            <div class="nav-menu-group">
                <button class="nav-menu-btn next-btn" id="next-btn-text" style="flex: 2;" onclick="goToStep(2)">ДАЛІ ➔</button>
            </div>
        </div>
        
        <div class="setup-container" id="step-difficulty-view" style="display: none;">
            <h3 id="step2-title">КРОК 2: ОБЕРІТЬ СКЛАДНІСТЬ</h3>
            <button class="select-btn active" id="diff-btn-easy" onclick="selectDifficulty('easy')">ЛЕГКИЙ РІВЕНЬ</button>
            <button class="select-btn" id="diff-btn-medium" onclick="selectDifficulty('medium')">СЕРЕДНІЙ РІВЕНЬ</button>
            <button class="select-btn" id="diff-btn-hardcore" onclick="selectDifficulty('hardcore')">ХАРДКОРНИЙ РІВЕНЬ</button>
            
            <div class="nav-menu-group">
                <button class="nav-menu-btn back-btn" id="back-btn-text" onclick="goToStep(1)">⬅ НАЗАД</button>
                <button class="nav-menu-btn next-btn" id="start-btn-text" onclick="startGame()">ГРАТИ 💀</button>
            </div>
        </div>
    </div>

    <div id="game-wrapper">
        <header>
            <h1 id="game-title">КВАРТИРА: ХОРР-ВИЖИВАННЯ</h1>
            <div id="score-counter" style="font-weight:bold; color:#888;"><span id="progress-label">Прогрес:</span> <span id="score" style="color:#fff;">0</span>/<span id="max-score-display">20</span></div>
        </header>

        <div class="status-container">
            <div class="status-box">
                <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                    <span id="label-fear">😱 РІВЕНЬ СТРАХУ</span>
                    <span id="fear-text">0%</span>
                </div>
                <div class="bar-bg"><div id="fear-fill" class="bar-fill"></div></div>
            </div>
            <div class="status-box">
                <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                    <span id="label-battery">🔋 ЛІХТАРИК</span>
                    <span id="battery-text">100%</span>
                </div>
                <div class="bar-bg"><div id="battery-fill" class="bar-fill"></div></div>
            </div>
        </div>

        <div id="apartment-map"></div>

        <div id="interaction-panel">
            <div id="task-info-topright"></div>

            <div id="task-text">...</div>
            <div class="btn-group">
                <button class="action-btn" id="main-action-btn" onclick="completeTask()">ВИКОНАТИ ДІЮ</button>
                <button class="action-btn skip-btn" id="skip-action-btn" onclick="skipTask()">ПРОПУСТИТИ ДІЮ</button>
            </div>
        </div>
    </div>

    <div id="screamer-screen" class="overlay-screen">
        <p id="screamer-monster">👹</p>
        <div class="ending-title" id="screamer-title" style="color:red; margin-top:20px;">ВАС УБИТО!</div>
        <div class="ending-desc" id="screamer-desc">...</div>
        <button class="restart-btn" id="btn-restart-1" onclick="showSetupScreen()">СПРОБУВАТИ ЗНОВУ</button>
    </div>

    <div id="darkness-screen" class="overlay-screen">
        <div class="ending-title" id="darkness-title" style="color:#555;">ТЕМРЯВА ЗАБРАЛА ВАС</div>
        <div class="ending-desc" id="darkness-desc">...</div>
        <button class="restart-btn" id="btn-restart-2" onclick="showSetupScreen()">СПРОБУВАТИ ЗНОВУ</button>
    </div>

    <div id="win-screen" class="overlay-screen">

            document.getElementById('apt-btn-2').innerText = t.apt + "2";
            document.getElementById('apt-btn-3').innerText = t.apt + "3";
            document.getElementById('diff-btn-easy').innerText = t.easy;
            document.getElementById('diff-btn-medium').innerText = t.medium;
            document.getElementById('diff-btn-hardcore').innerText = t.hardcore;
            document.getElementById('next-btn-text').innerText = t.next;
            document.getElementById('back-btn-text').innerText = t.back;
            document.getElementById('start-btn-text').innerText = t.play;
            document.getElementById('btn-restart-1').innerText = t.restartBtn;
            document.getElementById('btn-restart-2').innerText = t.restartBtn;
            document.getElementById('btn-restart-3').innerText = t.winBtn;
            document.getElementById('darkness-title').innerText = t.darkTitle;
            document.getElementById('darkness-desc').innerText = t.darkDesc;
            document.getElementById('win-title').innerText = t.winTitle;
        }

        function updateStaticGameLabels() {
            const t = i18n[currentLang];
            document.getElementById('progress-label').innerText = t.progress;
            document.getElementById('label-fear').innerText = t.fear;
            document.getElementById('label-battery').innerText = t.battery;
            document.getElementById('game-title').innerText = t.gameTitle.replace('{num}', chosenApartment);
        }

        function goToStep(stepNum) {
            document.getElementById('step-apartment-view').style.display = (stepNum === 1) ? 'flex' : 'none';
            document.getElementById('step-difficulty-view').style.display = (stepNum === 2) ? 'flex' : 'none';
        }

        function selectApartment(num) {
            chosenApartment = num;
            [1, 2, 3].forEach(i => document.getElementById(`apt-btn-${i}`).classList.remove('active'));
            document.getElementById(`apt-btn-${num}`).classList.add('active');
        }

        function selectDifficulty(level) {
            chosenDifficulty = level;
            ['easy', 'medium', 'hardcore'].forEach(lvl => document.getElementById(`diff-btn-${lvl}`).classList.remove('active'));
            document.getElementById(`diff-btn-${level}`).classList.add('active');
        }

        function buildMapUI() {
            const mapContainer = document.getElementById('apartment-map');
            mapContainer.innerHTML = ''; 
            mapContainer.className = (chosenApartment === 1) ? 'grid-apt1' : 'grid-apt-default';
            
            const roomsList = apartmentRooms[chosenApartment];
            const t = i18n[currentLang];
            const rm = roomLoc[currentLang];

            roomsList.forEach(roomKey => {
                if(roomKey === 'battery') return; 
                const roomDiv = document.createElement('div');
                roomDiv.className = 'room' + (currentRoom === roomKey ? ' active-room' : '');
                roomDiv.id = `room-${roomKey}`;
                roomDiv.onclick = () => selectRoom(roomKey);
                roomDiv.innerHTML = `
                    <span class="room-title">${rm[roomKey].toUpperCase()}</span>
                    <span style="font-size:0.75rem; color:#666;">${t.enter}</span>
                `;
                mapContainer.appendChild(roomDiv);
            });

            if (roomsList.includes('battery')) {
                const battDiv = document.createElement('div');
                battDiv.className = 'room' + (currentRoom === 'battery' ? ' active-room' : '');
                battDiv.id = 'room-battery';
                battDiv.onclick = () => selectRoom('battery');
                battDiv.innerHTML = `
                    <span class="room-title" style="color:#00ff66;">📋 ${rm['battery'].toUpperCase()}</span>
                    <span style="font-size:0.75rem; color:#00ff66;">${t.chest}</span>
                `;
                mapContainer.appendChild(battDiv);
            }

            const doorDiv = document.createElement('div');
            doorDiv.id = 'front-door';
            doorDiv.className = (chosenApartment === 1) ? 'door-apt1' : 'door-apt-default';
            doorDiv.onclick = toggleFrontDoor;
            
            const doorStateStr = isDoorOpen ? t.doorOpen : t.doorClosed;
            const doorColor = isDoorOpen ? '#ff3333' : '#00ff66';
            doorDiv.innerHTML = `${t.doorLabel} <span id="door-state-text" style="color:${doorColor}; margin-left:5px;">${doorStateStr}</span>`;
            mapContainer.appendChild(doorDiv);
        }

        function showSetupScreen() {
            document.getElementById('lang-wrapper-panel').style.display = 'flex';
            document.getElementById('screamer-screen').style.display = 'none';
            document.getElementById('darkness-screen').style.display = 'none';
            document.getElementById('win-screen').style.display = 'none';
            goToStep(1);
            document.getElementById('setup-screen').style.display = 'flex';
        }

        function startGame() {
            if (chosenDifficulty === 'easy') { totalStepsForDifficulty = 20; configBatteryDrain = 1.0; configFearGain = 1.0; }
            else if (chosenDifficulty === 'medium') { totalStepsForDifficulty = 28; configBatteryDrain = 2.4; configFearGain = 2.4; }
            else if (chosenDifficulty === 'hardcore') { totalStepsForDifficulty = 35; configBatteryDrain = 4.2; configFearGain = 4.2; }

            document.getElementById('max-score-display').innerText = totalStepsForDifficulty;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('lang-wrapper-panel').style.display = 'none'; 
            
            updateStaticGameLabels();
            buildMapUI();
            initGame();
        }

        function initGame() {
            score = 0; fear = 0; battery = 100; currentRoom = 'corridor';
            isDoorOpen = false; gameActive = true; isWaitingForNextTask = false; currentStepNumber = 1;
            
            const allowedRooms = apartmentRooms[chosenApartment];
            let basePool = JSON.parse(JSON.stringify(tasksRawPool));
            
            basePool.forEach(task => {
                if (!allowedRooms.includes(task.room)) {
                    let filterRooms = allowedRooms.filter(r => r !== 'battery');
                    task.room = filterRooms[Math.floor(Math.random() * filterRooms.length)];
                }
            });

            for (let i = basePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [basePool[i], basePool[j]] = [basePool[j], basePool[i]];
            }

            gameTasksSequence = basePool.slice(0, totalStepsForDifficulty);
            document.getElementById('score').innerText = score;
            setButtonsDisabled(false);
            updateStatusBars();
            selectRoom('corridor');
            startTickTimer();
        }

        let gameInterval;
        function startTickTimer() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameActive) return;
                if (currentRoom !== 'battery') battery -= configBatteryDrain; 
                fear += (battery < 35 || isDoorOpen) ? (configFearGain * 2.0) : configFearGain;
                if (battery < 0) battery = 0;
                if (fear > 100) fear = 100;
                updateStatusBars();
                checkLoseConditions();
            }, 1000);
        }

        function updateStatusBars() {
            document.getElementById('fear-text').innerText = Math.floor(fear) + '%';
            document.getElementById('fear-fill').style.width = fear + '%';
            document.getElementById('battery-text').innerText = Math.floor(battery) + '%';
            document.getElementById('battery-fill').style.width = battery + '%';
        }

        function selectRoom(roomName) {
            if (!gameActive || isWaitingForNextTask) return;
            currentRoom = roomName;
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active-room'));
            if(document.getElementById(`room-${roomName}`)) document.getElementById(`room-${roomName}`).classList.add('active-room');
            checkCurrentTaskState();
        }

        function checkCurrentTaskState() {
            const mainBtn = document.getElementById('main-action-btn');
            const skipBtn = document.getElementById('skip-action-btn');
            const infoLabel = document.getElementById('task-info-topright');
            const t = i18n[currentLang];
            const rm = roomLoc[currentLang];
            
            if (currentRoom === 'battery') {
                infoLabel.innerText = t.target + " " + rm['battery'];
                document.getElementById('task-text').innerText = t.batteryChestText;
                mainBtn.innerText = t.batteryChestBtn;
                mainBtn.style.display = 'block';
                skipBtn.style.display = 'none';
                setButtonsDisabled(false);
                return;
            }

            const activeTask = gameTasksSequence[currentStepNumber - 1];
            infoLabel.innerText = `${t.target} ${rm[activeTask.room]} ${activeTask.isTrap ? '⚠️' : ''}`;
            skipBtn.style.display = 'block';
            skipBtn.innerText = t.skipActionDefault;

            if (currentRoom === activeTask.room) {
                document.getElementById('task-text').innerText = `[${t.stepWord} ${currentStepNumber}/${totalStepsForDifficulty}] ` + activeTask.text[currentLang];
                mainBtn.innerText = activeTask.actionText[currentLang].toUpperCase();
                mainBtn.style.display = 'block';
                setButtonsDisabled(false);
            } else {
                document.getElementById('task-text').innerText = t.calm.replace('{r}', rm[activeTask.room].toUpperCase());
                mainBtn.style.display = 'none';
                skipBtn.style.display = 'none';
            }
        }

        function completeTask() {
            if (!gameActive || isWaitingForNextTask) return;
            const t = i18n[currentLang];

            if (currentRoom === 'battery') {
                battery = 100; fear = Math.max(0, fear - 8); updateStatusBars();
                document.getElementById('task-text').innerText = t.batteryRenewed;
                setButtonsDisabled(true); triggerDelay(); return;
            }

            const activeTask = gameTasksSequence[currentStepNumber - 1];

            if (activeTask.isTrap) {
                fear = Math.min(100, fear + 35); updateStatusBars();
                document.getElementById('task-text').innerText = t.trapTriggered;
            } else {
                score++; document.getElementById('score').innerText = score;
                fear = Math.max(0, fear - 12);
                if (chosenApartment < 3 && Math.random() < 0.35) {
                    battery = Math.min(100, battery + 30);
                    document.getElementById('task-text').innerText = t.taskClearedBattery;
                } else {
                    document.getElementById('task-text').innerText = t.taskCleared;
                }
                updateStatusBars();
            }
            setButtonsDisabled(true); checkLoseConditions(); if (gameActive) nextStep();
        }

        function skipTask() {
            if (!gameActive || isWaitingForNextTask || currentRoom === 'battery') return;
            const t = i18n[currentLang];
            const activeTask = gameTasksSequence[currentStepNumber - 1];

            if (activeTask.isTrap) {
                score++; document.getElementById('score').innerText = score;
                fear = Math.max(0, fear - 10); updateStatusBars();
                document.getElementById('task-text').innerText = t.skipTrap;
            } else {
                fear = Math.min(100, fear + 25); updateStatusBars();
                document.getElementById('task-text').innerText = t.skipNormal;
            }
            setButtonsDisabled(true); checkLoseConditions(); if (gameActive) nextStep();
        }

        function nextStep() {
            currentStepNumber++;
            if (currentStepNumber > totalStepsForDifficulty) {
                setTimeout(() => { endGame('win'); }, 1500);
            } else { triggerDelay(); }
        }

        function triggerDelay() {
            isWaitingForNextTask = true;
            setTimeout(() => { isWaitingForNextTask = false; checkCurrentTaskState(); }, 1500);
        }

        function setButtonsDisabled(state) {
            document.getElementById('main-action-btn').disabled = state;
            document.getElementById('skip-action-btn').disabled = state;
        }

        function toggleFrontDoor() {
            if (!gameActive) return;
            isDoorOpen = !isDoorOpen;
            const doorText = document.getElementById('door-state-text');
            const t = i18n[currentLang];
            
            if (isDoorOpen) {
                doorText.innerText = t.doorOpen; doorText.style.color = '#ff3333';
                fear += 15; updateStatusBars();
            } else {
                doorText.innerText = t.doorClosed; doorText.style.color = '#00ff66';
            }
        }

        function checkLoseConditions() {
            if (fear >= 100) endGame('screamer');
            else if (battery <= 0) endGame('darkness');
        }

        function endGame(status) {
            gameActive = false; clearInterval(gameInterval);
            const t = i18n[currentLang];
            
            if (status === 'screamer') {
                const pool = monstersPool[currentLang];
                const randomMonster = pool[Math.floor(Math.random() * pool.length)];
                
                const monsterElement = document.getElementById('screamer-monster');
                monsterElement.innerText = randomMonster.emoji;
                monsterElement.style.color = randomMonster.color;
                monsterElement.style.textShadow = `0 0 40px ${randomMonster.color}`;
                
                document.getElementById('screamer-title').innerText = randomMonster.title;
                document.getElementById('screamer-desc').innerText = randomMonster.desc;
                document.getElementById('screamer-screen').style.display = 'flex';
                try {
                    document.getElementById('screamer-sound').play();
                    document.getElementById('screamer-scream').play();
                } catch(e){}
            } else if (status === 'darkness') {
                document.getElementById('darkness-screen').style.display = 'flex';
            } else if (status === 'win') {
                document.getElementById('win-desc').innerText = t.winDesc.replace('{steps}', totalStepsForDifficulty).replace('{apt}', chosenApartment);
                document.getElementById('win-screen').style.display = 'flex';
            }
        }

        changeLanguage('uk');
    </script>
</body>
</html>
